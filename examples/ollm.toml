[runtime]
model_reference = "llama3-1B-chat"
models_dir = "models"
device = "cpu"
backend = "optimized-native"
cache_dir = "kv_cache"
use_cache = true
kv_cache_strategy = "chunked"
# kv_cache_window_tokens = 256  # only for sliding-window-ring-buffer
kv_cache_lifecycle = "runtime-scoped"
kv_cache_adaptation_mode = "observe-only"

[generation]
max_new_tokens = 128
temperature = 0.0
stream = false

[server]
host = "127.0.0.1"
port = 8000
reload = false
log_level = "info"

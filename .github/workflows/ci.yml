---
name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv (manual)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version
        shell: bash

      - name: Install Python and dependencies (manual)
        run: |
          uv python install 3.12
          uv sync --frozen --group dev --group docs --python 3.12
        shell: bash

      - name: Check formatting
        run: uv run --python 3.12 ruff format --check src tests scripts
        shell: bash

      - name: Run lint checks
        run: uv run --python 3.12 ruff check src tests scripts
        shell: bash

  typecheck:
    name: Type Check (ty)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv (manual)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version
        shell: bash

      - name: Install Python and dependencies (manual)
        run: |
          uv python install 3.12
          uv sync --frozen --group dev --group docs --python 3.12
        shell: bash

      - name: Run type checks
        run: uv run --python 3.12 ty check src tests scripts
        shell: bash

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv (manual)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version
        shell: bash

      - name: Install Python and dependencies (manual)
        run: |
          uv python install 3.12
          uv sync --frozen --group dev --group docs --python 3.12
        shell: bash

      - name: Run test suite
        run: uv run --python 3.12 pytest -q
        shell: bash

  docs:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv (manual)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version
        shell: bash

      - name: Install Python and dependencies (manual)
        run: |
          uv python install 3.12
          uv sync --frozen --group dev --group docs --python 3.12
        shell: bash

      - name: Build docs (strict)
        run: uv run --python 3.12 mkdocs build --strict
        shell: bash
